<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Michael's AI Assistant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        #chat-box {
            background: white;
            border-radius: 10px;
            padding: 20px;
            height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }
        .message {
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 8px;
            max-width: 80%;
        }
        .user {
            background: #0070f3;
            color: white;
            margin-left: auto;
        }
        .assistant {
            background: #f0f0f0;
            color: #333;
        }
        #input-area {
            display: flex;
            gap: 10px;
        }
        #user-input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background: #0070f3;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0051a8;
        }
    </style>
</head>
<body>
    <h1>Chat with Michael's AI Assistant</h1>
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask me anything about Michael..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const API_KEY = "replace_me";
        const messages = [];

        const SYSTEM_PROMPT = `You are an AI assistant representing Michael, an aspiring AI engineer and web developer. 
        Answer questions about his skills, projects and experience in a friendly and professional way.
        Here is his background:
        - He is learning to build AI products
        - He has some programming experience
        - He recently built his portfolio site at ai-michael.nl
        - He is passionate about AI and web development
        - He is based in the Netherlands`;

        async function sendMessage() {
            const input = document.getElementById("user-input");
            const chatBox = document.getElementById("chat-box");
            const userMessage = input.value.trim();
            if (!userMessage) return;

            // Add user message to chat
            chatBox.innerHTML += `<div class="message user">${userMessage}</div>`;
            messages.push({ role: "user", content: userMessage });
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            // Call Anthropic API
            try {
                const response = await fetch("https://api.anthropic.com/v1/messages", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "x-api-key": API_KEY,
                        "anthropic-version": "2023-06-01",
                        "anthropic-dangerous-direct-browser-access": "true"
                    },
                    body: JSON.stringify({
                        model: "claude-sonnet-4-20250514",
                        max_tokens: 1000,
                        system: SYSTEM_PROMPT,
                        messages: messages
                    })
                });

                const data = await response.json();
                const assistantMessage = data.content[0].text;
                messages.push({ role: "assistant", content: assistantMessage });
                chatBox.innerHTML += `<div class="message assistant">${assistantMessage}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (error) {
                chatBox.innerHTML += `<div class="message assistant">Sorry, something went wrong. Please try again.</div>`;
            }
        }

        // Allow Enter key to send
        document.getElementById("user-input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
